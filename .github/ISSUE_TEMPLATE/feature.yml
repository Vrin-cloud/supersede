name: Feature / idea
description: Propose an improvement (new episodes, rewards, model results, etc.)
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like to see, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you've already tried or ruled out.
    validations:
      required: false
